# .github/workflows/docker-publish.yml
#
# Pushes to:
#   ghcr.io/<github-actor>/devcontainer
#   docker.io/itsapinhulk/devcontainer
#
# Required secrets:
#   GHCR_TOKEN (or GITHUB_TOKEN)  – GitHub PAT with write:packages scope
#   DOCKERHUB_ITSAPINHULK_TOKEN   – Docker Hub access token for itsapinhulk

name: CI/CD

on:
  push:
  workflow_dispatch: # allows manual triggering

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Run tests
        run: python test/test_deploy_dotfiles.py -v

  build-and-push:
    needs: test
    if: github.ref == 'refs/heads/main' # Only push to Docker Hub from main branch
    environment: docker # Grants access to environment secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # allows pushing to ghcr.io via GITHUB_TOKEN
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: itsapinhulk
          password: ${{ secrets.DOCKERHUB_ITSAPINHULK_TOKEN }}

      - name: Build and push
        run: ./ci-scripts/build-and-push.sh --skip-confirm --push-images
