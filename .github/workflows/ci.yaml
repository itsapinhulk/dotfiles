name: Continuous Integration and Deployment

on:
  push:
  workflow_dispatch:  # allows manual triggering

jobs:
  build-and-push:
    if: github.ref == 'refs/heads/main'  # Only push to Docker Hub from main branch
    environment: docker   # Grants access to environment secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: itsapinhulk
          password: ${{ secrets.DOCKERHUB_ITSAPINHULK_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            itsapinhulk/devcontainer:latest
