name: CI

on:
  push:
  pull_request:
  workflow_dispatch: # allows manual triggering

jobs:
  test-deploy-dotfiles:
    # Run against a wide variety of OSes and Python versions
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.15"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Run deploy-dotfiles tests
        run: python test/test_deploy_dotfiles.py -v
