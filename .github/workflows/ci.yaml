# .github/workflows/docker-publish.yml
#
# Pushes to:
#   ghcr.io/<github-actor>/devcontainer
#   docker.io/itsapinhulk/devcontainer
#
# Required secrets:
#   GHCR_TOKEN (or GITHUB_TOKEN)  – GitHub PAT with write:packages scope
#   DOCKERHUB_ITSAPINHULK_TOKEN   – Docker Hub access token for itsapinhulk

name: Continuous Integration and Deployment

on:
  push:
  workflow_dispatch: # allows manual triggering

jobs:
  build-and-push:
    if: github.ref == 'refs/heads/main' # Only push to Docker Hub from main branch
    environment: docker # Grants access to environment secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # allows pushing to ghcr.io via GITHUB_TOKEN
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: itsapinhulk
          password: ${{ secrets.DOCKERHUB_ITSAPINHULK_TOKEN }}

      - name: Build and push
        run: ./ci-scripts/build-and-push.sh --skip-confirm --push-images
