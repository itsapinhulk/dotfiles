# Builds and pushes the devcontainer image once a day to:
#   ghcr.io/itsapinhulk/devcontainer
#   docker.io/itsapinhulk/devcontainer
#
# Required secrets:
#   GHCR_TOKEN (or GITHUB_TOKEN)  – GitHub PAT with write:packages scope
#   DOCKERHUB_ITSAPINHULK_TOKEN   – Docker Hub access token for itsapinhulk

name: CD

on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC
  workflow_dispatch: # allows manual triggering

jobs:
  build-and-push:
    if: github.ref == 'refs/heads/main'
    environment: docker # grants access to environment secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # allows pushing to ghcr.io via GITHUB_TOKEN
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: itsapinhulk
          password: ${{ secrets.DOCKERHUB_ITSAPINHULK_TOKEN }}

      - name: Build and push
        run: |
          ./ext/itsapinhulk/shellutils/bash/build-push-docker . \
            --registry ghcr.io/itsapinhulk/devcontainer \
            --registry docker.io/itsapinhulk/devcontainer \
            --skip-push-confirm \
            --build-arg "REPO_URL=${{ github.server_url }}/${{ github.repository }}"
